<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!--
    Favicon for Dr. Nitin N Sunku — Orthopedic Specialist.
    Concept:
      • Rounded-square badge in the brand blue gradient (#2563EB → #1E40AF)
      • White stylized "N" monogram (for Nitin) with a subtle bone-joint
        cap at the top-right diagonal stroke (a tiny dumbbell shape) so the
        medical / orthopedic identity reads even at 16px.
      • Designed at 64×64 master, scales cleanly down to 16×16.
  -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="55%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#1E40AF"/>
    </linearGradient>
  </defs>

  <!-- Rounded badge background -->
  <rect x="0" y="0" width="64" height="64" rx="14" ry="14" fill="url(#bg)"/>

  <!-- Subtle inner highlight for depth -->
  <rect x="0" y="0" width="64" height="64" rx="14" ry="14" fill="none"
        stroke="rgba(255,255,255,0.12)" stroke-width="1"/>

  <!--
    The "N" monogram.
    Built from 3 thick strokes so it stays legible at 16px.
    Stroke positions are picked so the diagonal cap acts as a bone joint.
  -->
  <g fill="#FFFFFF">
    <!-- Left vertical stroke -->
    <rect x="14" y="14" width="9" height="36" rx="2.5"/>
    <!-- Right vertical stroke -->
    <rect x="41" y="14" width="9" height="36" rx="2.5"/>
    <!-- Diagonal stroke connecting top-left to bottom-right -->
    <path d="M14 14 L23 14 L50 50 L41 50 Z"/>
  </g>

  <!--
    Bone-joint accent: a small circle "ball" at the top of the right stroke,
    suggesting a femoral head / joint capsule. Only ~6% of the canvas so it
    reads as a dot at 16px without competing with the N.
  -->
  <circle cx="45.5" cy="11.5" r="4" fill="#F59E0B" stroke="#FFFFFF" stroke-width="1.5"/>
</svg>
